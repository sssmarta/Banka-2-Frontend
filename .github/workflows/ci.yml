name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  cypress-mocked:
    name: Cypress E2E Tests (Mocked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          build: npm run build
          start: npx serve -s dist -l 3000
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          config: video=false
          spec: "cypress/e2e/celina1-mock.cy.ts,cypress/e2e/celina2-mock.cy.ts,cypress/e2e/celina3-mock.cy.ts"

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-mocked-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  cypress-live:
    name: Cypress E2E Tests (Live)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: banka2
          MYSQL_USER: banka2user
          MYSQL_PASSWORD: banka2pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull backend image
        id: pull-backend
        continue-on-error: true
        run: docker pull ghcr.io/raf-si-2025/banka2-backend:latest

      - name: Skip if backend image unavailable
        if: steps.pull-backend.outcome == 'failure'
        run: |
          echo "::warning::Backend Docker image not available (GHCR private). Skipping Live E2E."
          echo "To fix: make ghcr.io/raf-si-2025/banka2-backend package public, or add a GHCR_PAT secret with read:packages scope."
          echo "SKIP_LIVE=true" >> $GITHUB_ENV

      - name: Start backend container
        if: env.SKIP_LIVE != 'true'
        run: |
          docker run -d --name backend --network host \
            -e SPRING_DATASOURCE_URL="jdbc:mysql://127.0.0.1:3306/banka2?useUnicode=true&characterEncoding=UTF-8" \
            -e SPRING_DATASOURCE_USERNAME="banka2user" \
            -e SPRING_DATASOURCE_PASSWORD="banka2pass" \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO="update" \
            -e SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT="org.hibernate.dialect.MySQLDialect" \
            ghcr.io/raf-si-2025/banka2-backend:latest

      - name: Wait for backend to be ready
        if: env.SKIP_LIVE != 'true'
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/swagger-ui.html > /dev/null 2>&1 || curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Attempt $i - waiting..."
            sleep 5
          done

          echo "Backend failed to start in time."
          docker logs backend || true
          exit 1

      - name: Seed database
        if: env.SKIP_LIVE != 'true'
        run: |
          git clone --depth 1 https://github.com/RAF-SI-2025/Banka-2-Backend.git /tmp/backend
          mysql -h 127.0.0.1 -u banka2user -pbanka2pass banka2 < /tmp/backend/seed.sql
          echo "Database seeded successfully!"

      - name: Build frontend
        if: env.SKIP_LIVE != 'true'
        run: npm run build

      - name: Create CI nginx config
        if: env.SKIP_LIVE != 'true'
        run: |
          sed 's|http://banka2_backend:8080/|http://127.0.0.1:8080/|g' nginx.conf > nginx.ci.conf

      - name: Build frontend nginx image
        if: env.SKIP_LIVE != 'true'
        run: docker build -t banka2-frontend:ci-test .

      - name: Start frontend with nginx
        if: env.SKIP_LIVE != 'true'
        run: |
          docker run -d --name frontend --network host \
            -v "$(pwd)/nginx.ci.conf:/etc/nginx/conf.d/default.conf:ro" \
            banka2-frontend:ci-test
          sleep 3

      - name: Run Cypress live tests
        if: env.SKIP_LIVE != 'true'
        uses: cypress-io/github-action@v6
        with:
          install: false
          wait-on: "http://localhost"
          wait-on-timeout: 60
          config: video=false,baseUrl=http://localhost
          spec: "cypress/e2e/celina1-live.cy.ts,cypress/e2e/celina2-live.cy.ts,cypress/e2e/celina3-live.cy.ts"

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-live-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Show backend logs on failure
        if: failure()
        run: docker logs backend || true

      - name: Show frontend logs on failure
        if: failure()
        run: docker logs frontend || true

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t banka2-frontend:ci-test .