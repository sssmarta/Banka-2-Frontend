server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Arbitro AI chat — SSE streaming (text/event-stream).
    # Mora se ISKLJUCITI buffering inace nginx ceka da ceo response stigne pa
    # tek onda emituje, sto kvari token-by-token UX. Plus dugacak timeout jer
    # CPU inference moze biti 100-180s.
    location /api/assistant/chat {
        proxy_pass http://banka2_backend:8080/assistant/chat;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Standard API proxy za sve ostale rute (sa default timeout-ima)
    location /api/ {
        proxy_pass http://banka2_backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback - all frontend routes serve index.html
    # React Router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
